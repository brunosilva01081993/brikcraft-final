<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <header class="header-bg">
    <div class="header">
      <a href="./">
        <img src="./img/bikcraft.svg" alt="">
      </a>
      <nav aria-label="primaria">
        <ul class="header-menu">
          <li><a href="./bibicletas.html">Bicicletas</a></li>
          <li><a href="./seguros.html">Seguros</a></li>
          <li><a href="./contato.html">Contato</a></li>
        </ul>
      </nav>
  </header>
  <div class="termos-bg">
    <div class="termos-titulo">
      <p>Cotações no seu email</p>
      <h1 class="texto-grande">solicite um orçamento<span class="ponto-amarelo">.</span></h1>
    </div>
    <div class="orcamento-container">
      <div class="orcamento-opcoes">
        <h2>Bikcraft ou Seguro?</h2>
        <div>
          <label for="bikcraft">Bikcraft</label>
          <label for="seguro">Seguro</label>
        </div>
        <h2>Escolha a sua:</h2>
        <label for="nimbus stark">Nimbus Stark</label>
        <label for="magic might">Magic Might</label>
        <label for="nebula cosmic">Nebula Cosmic</label>
      </div>
      <div class="orcamento-dados">
        <h2>Dados Pessoais</h2>
        <div>
          <label for="nome">Nome</label>
          <input type="text" id="nome">
        </div>
        <div>
          <label for="nome">Sobrenome</label>
          <input type="text" id="sobrenome">
        </div>
        <div class="cpf">
          <label for="nome">CPF</label>
          <input type="text" id="cpf">
        </div>
        <div>
          <label for="nome">Email</label>
          <input type="email" id="email">
        </div>
        <h2>Entrega</h2>
        <div>
          <label for="nome">CEP</label>
          <input type="number" id="cep">
        </div>
        <div>
          <label for="nome">Númeno</label>
          <input type="number" id="numero">
        </div>
        <div>
          <label for="nome">Largadouro</label>
          <input type="text" id="largadouro">
        </div>
        <div>
          <label for="nome">Bairro</label>
          <input type="text" id="bairro">
        </div>
        <div>
          <label for="nome">Cidade</label>
          <input type="text" id="cidade">
        </div>
        <div>
          <label for="nome">Estado</label>
          <input type="text" id="estado">
        </div>
        <button class="btn">Solicitar Orcamento</button>
      </div>
    </div>
  </div>
















</body>

</html>
